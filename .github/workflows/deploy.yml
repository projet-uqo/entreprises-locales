# This is a basic workflow to help you get started with Actions

# Déploiement automatique du site web via GitHub Actions
name: Déploiement du site (GitHub Pages et Netlify)

permissions:
  contents: write
  pull-requests: read

# 📅 Déclenchement du workflow
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ] # Déclenché à chaque push sur la branche principale
    paths:
      - "approved/**"  # Déclenche quand tu approuves une soumission
      - "!submissions/**" # Ignore les soumissions non approuvées
      - "!site/Informations sur les entreprises.xlsx" # Empêche les boucles

  pull_request:
    branches: [ "main" ] # Optionnel : déclenche sur les pull requests
    types: [opened, synchronize]

 # Permet de lancer manuellement depuis l'onglet Actions
  workflow_dispatch: 

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
# Définition du job principal
jobs:
  # This workflow contains a single job called "build"
  build:
    # 🔐 Sécurité : empêcher les PR externes et les boucles
    if: >
      github.actor != 'github-actions[bot]' &&
      (github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository)

    # The type of runner that the job will run on
    runs-on: ubuntu-latest # Utilise un environnement Linux pour exécuter les étapes

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      # Étape 1 : Récupération du dépôt
      - name: Checkout dépôt
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: main
        
      # Étape 2 : Configuration de Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      #  Étape 3 : Installation des dépendances
      - name: Installer les dépendances Python
        run: |
          pip install pandas folium openpyxl tqdm geopy

      # Étape 4: Traiter les soumissions approuvés
      - name: Traiter les soumissions approuvées
        run: |
          python process_approved.py


      #  Étape 5 : Génération du sitemap et robots.txt (commentée pour l’instant)
      - name: Générer le site, sitemap et robots.txt
        run: |
          python generate_site.py
          python generate_sitemap.py

      # Étape 6 : Vérification que index.html existe
      - name: Vérifier la présence de index.html
        run: |
          test -f site/index.html && echo "index.html présent" || (echo "index.html manquant" && exit 1)
     
      # Étape 7 : Vérification que sitemap.xml et robot.txt existent
      - name: Vérifier la présence de sitemap.xml et robots.txt
        run: |
          test -f site/sitemap.xml && echo "✅ sitemap.xml présent" || (echo "sitemap.xml manquant" && exit 1)
          test -f site/robots.txt && echo "✅ robots.txt présent" || (echo "robots.txt manquant" && exit 1)     
      
      # Étape 8 : Enregistrement et mise à jour du fichier Excel
      - name: Commit & push updated Excel file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add "site/Informations sur les entreprises.xlsx"
          git commit -m "Mise à jour automatique du fichier Excel via GitHub Actions" || echo "Aucun changement à committer"
          git push

      # Étape 9 : Mise à jour du dossier site/ dans main (pour Netlify)
      # Netlify lit la branche main → il doit voir le dossier site/
      - name: Commit & push site/ vers main (pour Netlify)
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add site
          git commit -m "Mise à jour du site pour Netlify" || echo "Aucun changement"
          git push  

      # Étape 10 : Déploiement vers GitHub Pages
      # GitHub Pages lit gh-pages → on publie aussi ici
      - name: Déployer vers GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages



